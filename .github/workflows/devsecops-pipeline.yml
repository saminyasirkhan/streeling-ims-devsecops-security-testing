name: DevSecOps Security Pipeline

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  snyk-sast:
    name: Snyk SAST and Dependency Scan
    runs-on: ubuntu-latest

    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Install Snyk CLI
        uses: snyk/actions/setup@master

      - name: Verify Snyk authentication
        run: |
          if [ -z "${SNYK_TOKEN}" ]; then
            echo "::error::SNYK_TOKEN is not configured. Add it in GitHub under Settings > Secrets and variables > Actions."
            exit 1
          fi

          snyk --version
          snyk auth "${SNYK_TOKEN}"

      - name: Create security report directory
        run: mkdir -p security-reports

      - name: Snyk scan backend dependencies
        working-directory: backend
        run: |
          set +e
          echo "Running Snyk high-severity scan for backend Python dependencies..."
          snyk test \
            --file=requirements.txt \
            --package-manager=pip \
            --severity-threshold=high \
            --json-file-output=../security-reports/snyk-backend.json
          echo $? > ../security-reports/snyk-backend.exitcode
          exit 0

      - name: Snyk scan frontend dependencies
        working-directory: frontend
        run: |
          set +e
          echo "Running Snyk high-severity scan for frontend npm dependencies..."
          snyk test \
            --severity-threshold=high \
            --json-file-output=../security-reports/snyk-frontend.json
          echo $? > ../security-reports/snyk-frontend.exitcode
          exit 0

      - name: Snyk Code SAST scan
        run: |
          set +e
          echo "Running Snyk Code static application security test..."
          snyk code test \
            --severity-threshold=high \
            --json-file-output=security-reports/snyk-code.json
          echo $? > security-reports/snyk-code.exitcode
          exit 0

      - name: Upload Snyk reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-security-reports
          path: security-reports/
          if-no-files-found: warn

      - name: Start backend server
        working-directory: backend
        run: |
          echo "Starting FastAPI backend on http://127.0.0.1:8000 ..."
          nohup python -m uvicorn main:app --host 127.0.0.1 --port 8000 > ../security-reports/backend-runtime.log 2>&1 &

          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8000/ > /dev/null; then
              echo "Backend is ready."
              exit 0
            fi
            echo "Waiting for backend... attempt ${attempt}"
            sleep 2
          done

          echo "::error::Backend did not become ready for DAST scanning."
          cat ../security-reports/backend-runtime.log
          exit 1

      - name: Start frontend server
        working-directory: frontend
        run: |
          echo "Starting Vite frontend on http://127.0.0.1:5173 ..."
          nohup npm run dev -- --host 127.0.0.1 --port 5173 > ../security-reports/frontend-runtime.log 2>&1 &

          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:5173/ > /dev/null; then
              echo "Frontend is ready."
              exit 0
            fi
            echo "Waiting for frontend... attempt ${attempt}"
            sleep 2
          done

          echo "::error::Frontend did not become ready for DAST scanning."
          cat ../security-reports/frontend-runtime.log
          exit 1

      - name: OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: "http://127.0.0.1:5173"
          docker_name: "ghcr.io/zaproxy/zaproxy:stable"
          allow_issue_writing: false
          fail_action: false
          artifact_name: zap-baseline-reports
          cmd_options: "-r report_html.html -J report_json.json"

      - name: Upload application runtime logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: application-runtime-logs
          path: |
            security-reports/backend-runtime.log
            security-reports/frontend-runtime.log
          if-no-files-found: warn

      - name: Enforce Snyk high-severity gate
        if: always()
        run: |
          BACKEND_EXIT=$(cat security-reports/snyk-backend.exitcode)
          FRONTEND_EXIT=$(cat security-reports/snyk-frontend.exitcode)
          CODE_EXIT=$(cat security-reports/snyk-code.exitcode)

          echo "Backend Snyk exit code: ${BACKEND_EXIT}"
          echo "Frontend Snyk exit code: ${FRONTEND_EXIT}"
          echo "Snyk Code SAST exit code: ${CODE_EXIT}"

          if [ "${BACKEND_EXIT}" -eq 1 ] || [ "${FRONTEND_EXIT}" -eq 1 ] || [ "${CODE_EXIT}" -eq 1 ]; then
            echo "::error::Snyk found high-severity vulnerabilities. The DevSecOps gate blocked the pipeline."
            exit 1
          fi

          if [ "${BACKEND_EXIT}" -ne 0 ] || [ "${FRONTEND_EXIT}" -ne 0 ] || [ "${CODE_EXIT}" -ne 0 ]; then
            echo "::error::Snyk scan did not complete successfully. Check the SNYK_TOKEN secret and scan logs."
            exit 1
          fi

          echo "Snyk high-severity gate passed."
